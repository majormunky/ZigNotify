name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsystemd-dev \
            libwayland-dev \
            wayland-protocols \
            libwayland-bin \
            libcairo2-dev \
            libgdk-pixbuf-2.0-dev \
            pkg-config
      - name: Fix systemd library path
        run: |
          sudo ldconfig
          pkg-config --libs libsystemd
          ls /usr/lib/x86_64-linux-gnu/libsystemd*

      - name: Clone wlr-protocols
        run: |
          git clone https://gitlab.freedesktop.org/wlroots/wlr-protocols.git /tmp/wlr-protocols

      - name: Generate Wayland protocol bindings
        run: |
          # xdg-shell
          wayland-scanner client-header \
            /usr/share/wayland-protocols/stable/xdg-shell/xdg-shell.xml \
            src/xdg-shell.h
          wayland-scanner private-code \
            /usr/share/wayland-protocols/stable/xdg-shell/xdg-shell.xml \
            src/xdg-shell.c

          # wlr-layer-shell
          wayland-scanner client-header \
            /tmp/wlr-protocols/unstable/wlr-layer-shell-unstable-v1.xml \
            src/wlr-layer-shell-unstable-v1.h
          wayland-scanner private-code \
            /tmp/wlr-protocols/unstable/wlr-layer-shell-unstable-v1.xml \
            src/wlr-layer-shell-unstable-v1.c

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: "0.14.0"

      - name: Build
        run: |
          SYSTEMD_LIBS=$(pkg-config --libs libsystemd)
          SYSTEMD_CFLAGS=$(pkg-config --cflags libsystemd)
          echo "systemd libs: $SYSTEMD_LIBS"
          echo "systemd cflags $SYSTEMD_CFLAGS"
          zig build -Dtarget=x86_64-linux-gnu -Doptimize=ReleaseSafe

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp zig-out/bin/munknotify release/munknotify
          cp munknotify.service release/munknotify.service
          cp README.md release/README.md

          # Create example config if it exists
          if [ -f config.example ]; then
            cp config.example release/config.example
          fi

          # Create a tarball
          tar -czf release/munknotify-${{ github.ref_name }}-x86_64-linux.tar.gz \
            -C release \
            munknotify \
            munknotify.service \
            README.md

      - name: Install git-cliff
        run: |
          wget -q https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf git-cliff-x86_64-unknown-linux-gnu.tar.gz
          sudo mv git-cliff-x86_64-unknown-linux-gnu/git-cliff /usr/local/bin/
          git-cliff --version
      - name: Generate changelog
        id: changelog
        run: |
          # Generate changelog for this tag only
          CHANGES=$(git-cliff --current --strip header 2>/dev/null || \
          git log --pretty=format:"- %s" $(git tag --sort=-creatordate | sed -n '2p')..HEAD)
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Update CHANGELOG.md
        run: |
          git-cliff --output CHANGELOG.md 2>/dev/null || true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: zignotify ${{ github.ref_name }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changes }}

            ## Installation

            Download the tarball, extract it, and run:
            ```bash
            # Install binary
            cp munknotify ~/.local/bin/munknotify
            chmod +x ~/.local/bin/munknotify

            # Install systemd service
            mkdir -p ~/.config/systemd/user
            cp munknotify.service ~/.config/systemd/user/
            systemctl --user daemon-reload
            systemctl --user enable --now munknotify
            ```

            ## Requirements
            - Wayland compositor with `wlr-layer-shell` support (Hyprland, Sway, river, etc.)
            - x86_64 Linux
          files: |
            release/munknotify-${{ github.ref_name }}-x86_64-linux.tar.gz
            release/munknotify
            release/munknotify.service
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}